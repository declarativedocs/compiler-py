presentation:
  layout: "16x9"
  title: "Acme Corp — Q3 2025 Review"
  author: "Strategy Team"

  theme:
    fonts:
      heading: Georgia
      body: Calibri
    colors:
      primary: "1E2761"
      secondary: "CADCFC"
      accent: "F96167"
      accent2: "F9E795"
      bg: "F2F4F8"
      white: "FFFFFF"
      dark: "0F0F1F"
      muted: "7B8794"
      success: "2D9F6F"
      chart1: "1E2761"
      chart2: "F96167"
      chart3: "2D9F6F"
      chart4: "F9E795"

  # ─── REUSABLE SLIDE MASTERS ───────────────
  masters:
    title_slide:
      background: $primary
      elements:
        - type: shape
          shape: rectangle
          x: 0
          y: 4.2
          w: 10
          h: 1.425
          fill: $dark
        - type: shape
          shape: line
          x: 0
          y: 4.2
          w: 10
          h: 0
          line: {color: $accent, width: 2}
        - type: text
          x: 0.8
          y: 1.2
          w: 8.4
          h: 2.2
          text: "{{title}}"
          font: $heading
          size: 44
          color: $white
          bold: true
          align: center
          valign: middle
        - type: shape
          shape: line
          x: 3.5
          y: 3.6
          w: 3
          h: 0
          line: {color: $accent, width: 3}
        - type: text
          x: 0.8
          y: 4.4
          w: 8.4
          h: 0.9
          text: "{{subtitle}}"
          size: 18
          color: $secondary
          align: center
          valign: middle

    section_header:
      background: $dark
      elements:
        - type: shape
          shape: rectangle
          x: 0
          y: 0
          w: 0.15
          h: 5.625
          fill: $accent
        - type: text
          x: 0.8
          y: 1.5
          w: 8.4
          h: 1.5
          text: "{{title}}"
          font: $heading
          size: 40
          color: $white
          bold: true
        - type: text
          x: 0.8
          y: 3.2
          w: 8.4
          h: 0.8
          text: "{{description}}"
          size: 16
          color: $muted

    content_slide:
      background: $bg
      elements:
        - type: shape
          shape: rectangle
          x: 0
          y: 0
          w: 10
          h: 0.06
          fill: $accent
        - type: text
          x: 0.6
          y: 0.25
          w: 8.8
          h: 0.65
          text: "{{title}}"
          font: $heading
          size: 30
          color: $primary
          bold: true

  # ─── SLIDES ───────────────────────────────
  slides:

    # 1. Title slide (uses master)
    - master: title_slide
      data:
        title: "Q3 2025 Performance Review"
        subtitle: "Acme Corp  ·  Strategy Team  ·  October 2025"

    # 2. Section header
    - master: section_header
      data:
        title: "Financial Highlights"
        description: "Revenue, retention, and growth metrics for the quarter"

    # 3. KPI cards — row layout
    - master: content_slide
      data:
        title: "Key Metrics at a Glance"
      elements:
        - type: group
          layout: row
          x: 0.6
          y: 1.3
          w: 8.8
          h: 2.0
          gap: 0.3
          card:
            fill: $white
            radius: 0.1
            shadow: default
          items:
            - runs:
                - {text: "$4.2M", size: 40, bold: true, color: $accent}
                - {text: "Revenue", size: 13, color: $muted}
            - runs:
                - {text: "89.3%", size: 40, bold: true, color: $success}
                - {text: "Retention", size: 13, color: $muted}
            - runs:
                - {text: "2,847", size: 40, bold: true, color: $primary}
                - {text: "New Users", size: 13, color: $muted}
            - runs:
                - {text: "+32%", size: 40, bold: true, color: $success}
                - {text: "QoQ Growth", size: 13, color: $muted}

        - type: text
          x: 0.6
          y: 3.55
          w: 8.8
          h: 1.2
          size: 13
          color: $muted
          valign: top
          bullets:
            - "Revenue exceeded target by 12%, driven by enterprise expansion"
            - "Retention improved 3.1 points from Q2 following onboarding changes"
            - "User acquisition cost decreased 18% through organic growth"

    # 4. Revenue chart
    - master: content_slide
      data:
        title: "Revenue Trend"
      elements:
        - type: chart
          chart: bar
          x: 0.4
          y: 1.2
          w: 5.5
          h: 4.0
          direction: col
          colors: [$chart1, $chart2]
          series:
            - name: "Recurring"
              labels: ["Q1", "Q2", "Q3", "Q4 (proj)"]
              values: [2800, 3200, 3700, 4100]
            - name: "One-time"
              labels: ["Q1", "Q2", "Q3", "Q4 (proj)"]
              values: [400, 600, 500, 800]
          style:
            gridLines: subtle
            legend: true
            legendPos: b
            dataLabels: outEnd
            axisColor: $muted

        - type: shape
          shape: rounded
          x: 6.4
          y: 1.2
          w: 3.3
          h: 4.0
          fill: $white
          radius: 0.1
          shadow: soft

        - type: text
          x: 6.6
          y: 1.4
          w: 2.9
          h: 0.5
          text: "Highlights"
          size: 18
          bold: true
          color: $primary
          font: $heading

        - type: text
          x: 6.6
          y: 2.0
          w: 2.9
          h: 2.6
          size: 12
          color: $dark
          valign: top
          bullets:
            - "Enterprise ARR grew 41% YoY"
            - "Net dollar retention hit 118%"
            - "Churn dropped to 2.1%"
            - "Avg deal size up 28%"
            - {text: "On track for $18M ARR", bold: true, color: $success}

    # 5. Team grid — grid layout
    - master: content_slide
      data:
        title: "Department Performance"
      elements:
        - type: group
          layout: grid
          columns: 3
          x: 0.6
          y: 1.2
          w: 8.8
          h: 4.0
          gap: 0.25
          card:
            fill: $white
            radius: 0.08
            shadow: soft
            border: "E0E4EA"
          items:
            - icon: {name: gear, bg: $primary}
              runs:
                - {text: "Engineering", size: 14, bold: true, color: $primary}
                - {text: "47 shipped features", size: 11, color: $dark}
                - {text: "99.97% uptime", size: 11, color: $success}
            - icon: {name: dollar, bg: $accent}
              runs:
                - {text: "Sales", size: 14, bold: true, color: $primary}
                - {text: "$4.2M closed", size: 11, color: $dark}
                - {text: "112% of quota", size: 11, color: $success}
            - icon: {name: target, bg: $chart3}
              runs:
                - {text: "Marketing", size: 14, bold: true, color: $primary}
                - {text: "1.2M impressions", size: 11, color: $dark}
                - {text: "CAC down 18%", size: 11, color: $success}
            - icon: {name: star, bg: $primary}
              runs:
                - {text: "Product", size: 14, bold: true, color: $primary}
                - {text: "NPS: 72 (+8)", size: 11, color: $dark}
                - {text: "3 major launches", size: 11, color: $success}
            - icon: {name: heart, bg: $accent}
              runs:
                - {text: "Customer Success", size: 14, bold: true, color: $primary}
                - {text: "CSAT: 94%", size: 11, color: $dark}
                - {text: "Churn: 2.1%", size: 11, color: $success}
            - icon: {name: chart, bg: $chart3}
              runs:
                - {text: "Finance", size: 14, bold: true, color: $primary}
                - {text: "Burn multiple: 0.8x", size: 11, color: $dark}
                - {text: "18 mo runway", size: 11, color: $success}

    # 6. Pipeline table
    - master: content_slide
      data:
        title: "Sales Pipeline — Top Opportunities"
      elements:
        - type: table
          x: 0.6
          y: 1.2
          w: 8.8
          h: 2.8
          size: 11
          font: $body
          colWidths: [3.0, 1.8, 1.4, 1.4, 1.2]
          border: {pt: 0.5, color: "DEE2E6"}
          rows:
            - - {text: "Account", bold: true, fill: $primary, color: $white}
              - {text: "Stage", bold: true, fill: $primary, color: $white}
              - {text: "Value", bold: true, fill: $primary, color: $white}
              - {text: "Close Date", bold: true, fill: $primary, color: $white}
              - {text: "Probability", bold: true, fill: $primary, color: $white}
            - ["GlobalTech Inc.", "Negotiation", "$420K", "Nov 15", "85%"]
            - ["Meridian Health", "Proposal", "$380K", "Dec 1", "65%"]
            - ["Atlas Logistics", "Discovery", "$290K", "Jan 15", "40%"]
            - ["Vertex Financial", "Negotiation", "$510K", "Nov 30", "75%"]
            - ["NovaChem Labs", "Proposal", "$340K", "Dec 15", "55%"]

        - type: group
          layout: row
          x: 0.6
          y: 4.3
          w: 8.8
          h: 0.9
          gap: 0.3
          card:
            fill: $primary
            radius: 0.06
          items:
            - runs:
                - {text: "Total Pipeline", size: 11, color: $secondary}
                - {text: "$1.94M", size: 22, bold: true, color: $white}
            - runs:
                - {text: "Weighted Value", size: 11, color: $secondary}
                - {text: "$1.27M", size: 22, bold: true, color: $white}
            - runs:
                - {text: "Avg Close Rate", size: 11, color: $secondary}
                - {text: "64%", size: 22, bold: true, color: $accent2}

    # 7. Pie + doughnut
    - master: content_slide
      data:
        title: "Revenue Breakdown"
      elements:
        - type: chart
          chart: pie
          x: 0.3
          y: 1.2
          w: 4.5
          h: 4.0
          chartTitle: "By Segment"
          colors: [$chart1, $chart2, $chart3, $chart4]
          series:
            - name: "Segment"
              labels: ["Enterprise", "Mid-Market", "SMB", "Self-Serve"]
              values: [45, 28, 18, 9]
          style:
            showPercent: true
            legend: true
            legendPos: b

        - type: chart
          chart: doughnut
          x: 5.2
          y: 1.2
          w: 4.5
          h: 4.0
          chartTitle: "By Region"
          colors: [$chart1, $chart3, $chart2, "A78BFA"]
          series:
            - name: "Region"
              labels: ["North America", "EMEA", "APAC", "LATAM"]
              values: [52, 24, 16, 8]
          style:
            showPercent: true
            legend: true
            legendPos: b

    # 8. Closing slide (uses title master with different data)
    - master: title_slide
      data:
        title: "Thank You"
        subtitle: "Questions?  ·  strategy@acmecorp.com"
